services:
  - type: web
    name: shinobi
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shinobi-db
          property: connectionString

databases:
  - name: shinobi-db
    databaseName: shinobi
    user: shinobi
    plan: free
