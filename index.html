<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
        }

        body {
            margin: 0;
            background: black;
        }

        /* ───────── MAIN MENU ───────── */

        #mainMenu {
            display: flex;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;

            background: rgba(0, 0, 0, 0.92);

            flex-direction: column;
            align-items: center;
            justify-content: center;

            z-index: 20;
            gap: 24px;
        }

        #menuTitle {
            font-size: 32px;
            color: #818CF8;
            letter-spacing: 6px;

            text-shadow:
                0 0 20px #818CF8,
                0 0 40px #818CF8;

            animation: pulse 2s ease-in-out infinite;
        }

        #menuSubtitle {
            font-size: 9px;
            color: rgba(255,255,255,0.55);
            letter-spacing: 3px;
        }

        #menuDivider {
            width: 60%;
            border: none;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        #menuControls {
            font-size: 7px;
            color: rgba(255,255,255,0.5);
            line-height: 2.4;
            text-align: center;
            letter-spacing: 1px;
        }

        #menuControls span {
            color: #818CF8;
        }

        #menuPrompt {
            font-size: 10px;
            color: white;
            letter-spacing: 3px;

            animation: blink 1.2s step-end infinite;
        }

        /* ───────── LEVEL TRANSITION ───────── */

        #levelTransition {
            display: none;
            position: absolute;

            top: 0;
            right: 0;
            bottom: 0;
            left: 0;

            background: rgba(0, 0, 0, 0.85);

            color: white;

            flex-direction: column;
            align-items: center;
            justify-content: center;

            z-index: 10;

            text-align: center;
            letter-spacing: 2px;
        }

        #levelTitle {
            font-size: 18px;
            line-height: 2.2;
            color: #818CF8;
        }

        #levelTitle span {
            font-size: 12px;
            color: white;
            opacity: 0.8;
        }

        /* ───────── END SCREEN ───────── */

        #restartHint {
            font-size: 8px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 16px;
            letter-spacing: 2px;
        }

        /* ───────── ANIMATIONS ───────── */

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow:
                    0 0 20px #818CF8,
                    0 0 40px #818CF8;
            }

            50% {
                text-shadow:
                    0 0 30px #a5b4fc,
                    0 0 60px #818CF8;
            }
        }
    </style>
</head>

<body>

    <div style="position: relative; display: inline-block;">

        <!-- MAIN MENU -->

        <div id="mainMenu">

            <div id="menuTitle">
                SHINOBI
            </div>

            <div id="menuSubtitle">
                1 player vs ai
            </div>

            <hr id="menuDivider">

            <div id="menuControls">
                <span>PLAYER</span>
                &nbsp; A / D move &nbsp; W jump &nbsp; SPACE attack
            </div>

            <div id="menuPrompt">
                press enter to start
            </div>

        </div>

        <!-- HUD -->

        <div style="position: absolute; display: flex; width: 100%; align-items: center; justify-content: center; padding: 20px; pointer-events: none;">

            <!-- TIMER -->

            <div
                id="timer"
                style="
                    background-color: black;
                    width: 100px;
                    height: 50px;
                    flex-shrink: 0;

                    display: flex;
                    align-items: center;
                    justify-content: center;

                    color: aliceblue;

                    border: 4px solid white;
                ">
                60
            </div>

        </div>

        <!-- RESULT TEXT -->

        <div
            id="displayText"
            style="
                position: absolute;
                color: white;

                flex-direction: column;
                align-items: center;
                justify-content: center;

                top: 0;
                right: 0;
                bottom: 0;
                left: 0;

                display: none;
            ">

            Tie

            <div id="restartHint">
                press R for main menu
            </div>

        </div>

        <!-- LEVEL TRANSITION -->

        <div id="levelTransition">
            <div id="levelTitle">
                Level 1
                <br>
                <span>The Dojo</span>
            </div>
        </div>

        <canvas></canvas>

    </div>

    <script
        src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"
        integrity="sha512-H6cPm97FAsgIKmlBA4s774vqoN24V5gSQL4yBTDOY2su2DeXZVhQPxFK4P6GPdnZqM9fg1G3cMv5wD7e6cFLZQ=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer">
    </script>

    <script src="shinobi.js/functions.js"></script>
    <script src="shinobi.js/classes.js"></script>
    <script src="shinobi.js/levelManager.js"></script>
    <script src="index.js"></script>

</body>
